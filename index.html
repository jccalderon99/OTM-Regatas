<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sistema de Órdenes de Trabajo de Mantenimiento - Gestión centralizada, en tiempo real y basada en roles" />
    <title>OTM - Sistema de Mantenimiento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <!-- Google Identity Services & Google APIs for Google Drive uploads -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script>
      // Self-healing bypass for PWA service worker interception of report static pages inside iframe
      if (window.self !== window.top && window.location.pathname.startsWith('/reports/')) {
        console.warn('React app loaded inside iframe for static report route. Unregistering service worker to force network load.');
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            var promises = [];
            for (var i = 0; i < registrations.length; i++) {
              promises.push(registrations[i].unregister());
            }
            Promise.all(promises).then(function() {
              console.log('Service worker unregistered. Reloading iframe...');
              window.location.reload(true);
            });
          }).catch(function(err) {
            console.error('Failed to unregister service worker:', err);
            window.location.reload(true);
          });
        } else {
          window.location.reload(true);
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
